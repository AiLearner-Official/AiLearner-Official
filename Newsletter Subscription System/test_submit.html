<!DOCTYPE html>
<html>
<head>
    <title>Test Form Submission</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .container { max-width: 500px; margin: 0 auto; }
        input, select, button { 
            width: 100%; 
            padding: 10px; 
            margin: 10px 0; 
            box-sizing: border-box;
        }
        .result { 
            margin-top: 20px; 
            padding: 15px; 
            border-radius: 5px;
            display: none;
        }
        .success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Test Form Submission</h1>
        
        <form id="testForm">
            <input type="text" id="name" placeholder="Name" value="John Doe" required>
            <input type="email" id="email" placeholder="Email" value="test@example.com" required>
            
            <select id="interest" required>
                <option value="">Select Interest</option>
                <option value="web" selected>Web Development</option>
                <option value="python">Python</option>
                <option value="mobile">Mobile App</option>
                <option value="java">Java</option>
                <option value="all">All</option>
            </select>
            
            <button type="submit">Submit Test</button>
        </form>
        
        <div id="result" class="result"></div>
        
        <div style="margin-top: 30px;">
            <h3>Links to check:</h3>
            <ul>
                <li><a href="setup_database.php" target="_blank">Setup Database</a></li>
                <li><a href="backend/subscribe.php?test=1">Test PHP File (Direct)</a></li>
                <li><a href="view_subscribers.php" target="_blank">View Subscribers</a></li>
            </ul>
        </div>
    </div>
    
    <script>
        document.getElementById('testForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const formData = {
                name: document.getElementById('name').value,
                email: document.getElementById('email').value,
                interest: document.getElementById('interest').value
            };
            
            try {
                const response = await fetch('backend/subscribe.php', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(formData)
                });
                
                const result = await response.json();
                const resultDiv = document.getElementById('result');
                
                resultDiv.className = result.success ? 'result success' : 'result error';
                resultDiv.innerHTML = `
                    <h3>${result.success ? '✓ Success' : '✗ Error'}</h3>
                    <p>${result.message}</p>
                    <pre>${JSON.stringify(result.data, null, 2)}</pre>
                `;
                resultDiv.style.display = 'block';
                
                console.log('Result:', result);
            } catch (error) {
                const resultDiv = document.getElementById('result');
                resultDiv.className = 'result error';
                resultDiv.innerHTML = `<h3>Network Error</h3><p>${error.message}</p>`;
                resultDiv.style.display = 'block';
                console.error('Error:', error);
            }
        });
    </script>
</body>
</html>
